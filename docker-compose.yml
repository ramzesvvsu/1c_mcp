services:
  mcp-proxy:
    image: 1c-mcp-proxy
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 1c-mcp-proxy
    ports:
      # Внешний порт берётся из .env (MCP_PORT), по умолчанию 8000; внутри контейнера всегда 8000
      - "${MCP_PORT:-8000}:8000"
    environment:
      # Мультибазовый режим: список баз берётся из примонтированного bases.json
      - MCP_BASES_FILE=/app/bases.json
      - MCP_AUTH_MODE=${MCP_AUTH_MODE:-none}
      - MCP_LOG_LEVEL=${MCP_LOG_LEVEL:-INFO}
    volumes:
      # Файл со списком баз 1С (см. bases.json.example). Правится без пересборки образа.
      - ./bases.json:/app/bases.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5.0).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
